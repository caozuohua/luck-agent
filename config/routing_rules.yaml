rules:
  - name: "shell"
    patterns: ["运行", "执行", "脚本", "命令", "shell", "command", "terminal", "ls", "cat", "pwd", "目录", "文件夹", "当前目录", "列出", "文件列表", "磁盘", "时间", "日期", "几点", "几号", "现在", "今天", "明天", "昨天", "星期", "date", "time", "clock", "now", "pwd", "ls", "cd", "disk", "directory", "folder", "list", "run"]
    tools: ["shell"]

  - name: "search"
    patterns: ["搜索", "查找", "查询", "最新", "新闻", "天气", "news", "weather", "search", "find", "lookup", "google"]
    tools: ["web_search"]

fallback_tools:
  - "shell"
  - "web_search"
